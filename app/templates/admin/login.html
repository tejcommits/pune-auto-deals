{% extends "base.html" %}
{% block body_class %}admin login-page{% endblock %}
{% block body %}
<div class="login-box">
  <img class="login-logo" src="{{ url_for('static', filename='img/logo.svg') }}" alt="{{ business_name }}">
  <p class="muted">Owner Console</p>
  <form method="post">
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button type="submit" class="btn-primary">Log in</button>
  </form>
</div>
{% endblock %}
